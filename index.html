<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>গ্লাস ক্যামেরা · প্রো এনহ্যান্স</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:#fff;
      font-family:'Inter', system-ui, sans-serif;
      touch-action:manipulation;
    }

    #video {
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
      background:#000;
    }

    .overlay {
      position:fixed;
      inset:0;
      z-index:2;
      pointer-events:none;
    }

    .glass {
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.18);
      border-radius:9999px;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
    }

    .mode-selector {
      position:fixed;
      top:20px;
      right:20px;
      z-index:10;
      pointer-events:auto;
    }

    .mode-pill {
      padding:6px 16px;
      font-size:13.5px;
      font-weight:600;
      color:rgba(255,255,255,0.9);
      cursor:pointer;
    }

    .mode-options {
      position:absolute;
      top:42px;
      right:0;
      background:rgba(20,20,20,0.96);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:14px;
      padding:8px 0;
      width:165px;
      display:none;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    .mode-option {
      padding:9px 20px;
      font-size:14px;
      font-weight:500;
      cursor:pointer;
      transition:.2s;
    }

    .mode-option:hover, .mode-option.active {
      background:rgba(255,255,255,0.12);
    }

    .sub-option {
      padding:7px 20px;
      font-size:12.5px;
      color:rgba(255,255,255,0.75);
      cursor:pointer;
    }

    .sub-option:hover {
      background:rgba(255,255,255,0.1);
      color:#fff;
    }

    .reset-option {
      padding:10px 20px;
      font-size:13px;
      color:#ff6b6b;
      cursor:pointer;
      border-top:1px solid rgba(255,255,255,0.1);
      margin-top:6px;
    }

    .reset-option:hover {
      background:rgba(255,107,107,0.15);
    }

    .controls {
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      gap:50px;
      z-index:10;
      pointer-events:auto;
    }

    .capture-btn {
      width:82px;
      height:82px;
      border-radius:50%;
      background:rgba(255,255,255,0.95);
      border:6px solid #fff;
      box-shadow:0 0 0 10px rgba(255,255,255,0.25);
      cursor:pointer;
      transition:transform .2s;
      outline:none;
      -webkit-tap-highlight-color:transparent;
      position:relative;
    }

    .capture-btn:active { transform:scale(0.92); }
    .capture-btn.processing { opacity:0.5; pointer-events:none; }

    .side-btn {
      width:58px;
      height:58px;
      border-radius:50%;
      background:rgba(255,255,255,0.12);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.15);
      transition:.3s;
      outline:none;
      -webkit-tap-highlight-color:transparent;
      cursor:pointer;
    }

    .side-btn:active {
      background:rgba(255,255,255,0.25);
      transform:scale(0.95);
    }

    .flash {
      position:fixed;
      inset:0;
      background:#fff;
      opacity:0;
      pointer-events:none;
      z-index:100;
      transition:opacity .15s;
    }

    .preview {
      position:fixed;
      top:25px;
      left:25px;
      width:85px;
      height:120px;
      border-radius:18px;
      overflow:hidden;
      border:3px solid rgba(255,255,255,0.3);
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
      display:none;
      z-index:20;
    }

    .preview img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .timer {
      position:fixed;
      top:100px;
      left:50%;
      transform:translateX(-50%);
      font-size:72px;
      font-weight:700;
      text-shadow:0 4px 20px rgba(0,0,0,0.7);
      z-index:30;
      display:none;
    }

    .result-page {
      position:fixed;
      inset:0;
      background:#000;
      z-index:200;
      display:none;
      align-items:center;
      justify-content:center;
    }

    .result-page img {
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }

    canvas { display:none; }

    .processing-overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      backdrop-filter:blur(12px);
      z-index:50;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:12px;
    }

    .processing-overlay.active { display:flex; }

    .spinner {
      width:36px;
      height:36px;
      border:3px solid rgba(255,255,255,0.06);
      border-top:3px solid #fff;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform:rotate(360deg); }
    }

    .proc-text {
      font-size:14px;
      font-weight:500;
      color:rgba(255,255,255,0.7);
      letter-spacing:0.5px;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>

  <div class="overlay">
    <div class="mode-selector glass">
      <div class="mode-pill" id="currentMode" onclick="toggleModeMenu()">HD</div>
      <div class="mode-options" id="modeOptions">
        <div class="mode-option active" onclick="setQualityMode(0)">HD</div>
        <div class="mode-option" onclick="setQualityMode(1)">Ultra HD</div>
        <div class="mode-option" onclick="setQualityMode(2)">DSLR</div>

        <div style="height:1px;background:rgba(255,255,255,0.1);margin:6px 12px;"></div>

        <div class="sub-option" onclick="toggleHDR(this)">HDR</div>
        <div class="sub-option" onclick="togglePortrait(this)">Portrait</div>

        <div class="reset-option" onclick="resetSettings()">সেটিংস রিসেট করুন</div>
      </div>
    </div>

    <div id="preview" class="preview">
      <img id="thumb" src="" alt="">
    </div>

    <div id="timer" class="timer">3</div>

    <div class="controls">
      <div class="side-btn glass" onclick="switchCamera()" title="ক্যামেরা সুইচ">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6"></path>
          <path d="M9 21H3v-6"></path>
          <path d="M21 3L3 21"></path>
        </svg>
      </div>

      <div id="captureBtn" class="capture-btn" onclick="capturePhoto()"></div>

      <div class="side-btn glass" onclick="toggleGallery()" title="গ্যালারি">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </div>
    </div>
  </div>

  <div id="flash" class="flash"></div>
  <div id="resultPage" class="result-page">
    <img id="resultImg" alt="Result">
  </div>

  <div class="processing-overlay" id="processingOverlay">
    <div class="spinner"></div>
    <div class="proc-text">✨ Enhancing...</div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    // ============================================================
    //  STATE
    // ============================================================
    let stream = null;
    let currentCamera = 'environment';
    let currentQuality = 0;
    let isHDR = false;
    let isPortrait = false;
    let isProcessing = false;

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const flash = document.getElementById('flash');
    const preview = document.getElementById('preview');
    const thumb = document.getElementById('thumb');
    const timerEl = document.getElementById('timer');
    const currentModeEl = document.getElementById('currentMode');
    const modeOptions = document.getElementById('modeOptions');
    const resultPage = document.getElementById('resultPage');
    const resultImg = document.getElementById('resultImg');
    const captureBtn = document.getElementById('captureBtn');
    const processingOverlay = document.getElementById('processingOverlay');

    const qualityModes = ['HD', 'Ultra HD', 'DSLR'];

    const CAMERA_PRESETS = {
      0: { filter: "contrast(110%) brightness(103%) saturate(130%)", name: "HD" },
      1: { filter: "contrast(118%) brightness(105%) saturate(145%)", name: "UltraHD" },
      2: { filter: "contrast(125%) saturate(155%) brightness(106%)", name: "DSLR" }
    };

    // ============================================================
    //  🚀 PRO ENHANCEMENT ENGINE (No AI, All Math)
    // ============================================================
    function proEnhanceImage(sourceCanvas) {
      const w = sourceCanvas.width;
      const h = sourceCanvas.height;
      
      // Create working canvas
      const workCanvas = document.createElement('canvas');
      workCanvas.width = w;
      workCanvas.height = h;
      const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });
      workCtx.drawImage(sourceCanvas, 0, 0);

      const imageData = workCtx.getImageData(0, 0, w, h);
      const data = imageData.data;
      const output = workCtx.createImageData(w, h);
      const dst = output.data;

      // Copy original
      for (let i = 0; i < data.length; i++) {
        dst[i] = data[i];
      }

      // =========================================================
      //  1. UNSHARP MASK (প্রফেশনাল শার্পনিং)
      // =========================================================
      function unsharpMask(amount = 1.8, radius = 1) {
        const temp = new Float32Array(dst);
        const blurred = new Float32Array(dst.length);

        // Gaussian blur 3x3
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            for (let c = 0; c < 3; c++) {
              let idx = (y * w + x) * 4 + c;
              let sum = 0;
              for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                  sum += temp[((y + dy) * w + (x + dx)) * 4 + c];
                }
              }
              blurred[idx] = sum / 9;
            }
          }
        }

        // Subtract blur = sharpening
        for (let i = 0; i < dst.length; i += 4) {
          for (let c = 0; c < 3; c++) {
            let idx = i + c;
            let diff = dst[idx] - blurred[idx];
            dst[idx] = Math.min(255, Math.max(0, dst[idx] + amount * diff));
          }
        }
      }

      // =========================================================
      //  2. SMART NOISE REDUCTION
      // =========================================================
      function smartDenoise(strength = 0.3) {
        const temp = new Float32Array(dst);
        const radius = 2;
        
        for (let y = radius; y < h - radius; y++) {
          for (let x = radius; x < w - radius; x++) {
            for (let c = 0; c < 3; c++) {
              let idx = (y * w + x) * 4 + c;
              let sum = 0;
              let count = 0;
              
              for (let dy = -radius; dy <= radius; dy++) {
                for (let dx = -radius; dx <= radius; dx++) {
                  let nIdx = ((y + dy) * w + (x + dx)) * 4 + c;
                  if (Math.abs(temp[idx] - temp[nIdx]) < 25) {
                    sum += temp[nIdx];
                    count++;
                  }
                }
              }
              
              if (count > 0) {
                dst[idx] = temp[idx] * (1 - strength) + (sum / count) * strength;
              }
            }
          }
        }
      }

      // =========================================================
      //  3. AUTO LEVELS (কন্ট্রাস্ট ঠিক করা)
      // =========================================================
      function autoLevels() {
        let min = [255, 255, 255];
        let max = [0, 0, 0];

        for (let i = 0; i < dst.length; i += 4) {
          for (let c = 0; c < 3; c++) {
            let val = dst[i + c];
            if (val < min[c]) min[c] = val;
            if (val > max[c]) max[c] = val;
          }
        }

        for (let i = 0; i < dst.length; i += 4) {
          for (let c = 0; c < 3; c++) {
            if (max[c] > min[c]) {
              dst[i + c] = ((dst[i + c] - min[c]) / (max[c] - min[c])) * 255;
            }
          }
        }
      }

      // =========================================================
      //  4. VIBRANCE (শুধু ফিকে রং বুস্ট)
      // =========================================================
      function vibrance(amount = 0.35) {
        for (let i = 0; i < dst.length; i += 4) {
          let r = dst[i], g = dst[i + 1], b = dst[i + 2];
          let max = Math.max(r, g, b);
          let min = Math.min(r, g, b);
          let sat = max === 0 ? 0 : (max - min) / max;
          let boost = amount * (1 - sat);
          let avg = (r + g + b) / 3;
          
          dst[i] = Math.min(255, r + (r - avg) * boost);
          dst[i + 1] = Math.min(255, g + (g - avg) * boost);
          dst[i + 2] = Math.min(255, b + (b - avg) * boost);
        }
      }

      // =========================================================
      //  5. SHADOW/HIGHLIGHT RECOVERY
      // =========================================================
      function shadowHighlight(shadow = 0.15, highlight = 0.15) {
        for (let i = 0; i < dst.length; i += 4) {
          let avg = (dst[i] + dst[i + 1] + dst[i + 2]) / 3;
          
          if (avg < 128) {
            let factor = 1 + shadow * (1 - avg / 128);
            dst[i] = Math.min(255, dst[i] * factor);
            dst[i + 1] = Math.min(255, dst[i + 1] * factor);
            dst[i + 2] = Math.min(255, dst[i + 2] * factor);
          } else {
            let factor = 1 + highlight * (avg / 128 - 1);
            dst[i] = Math.min(255, dst[i] * factor);
            dst[i + 1] = Math.min(255, dst[i + 1] * factor);
            dst[i + 2] = Math.min(255, dst[i + 2] * factor);
          }
        }
      }

      // =========================================================
      //  6. DEHAZE (কুয়াশা দূর)
      // =========================================================
      function dehaze(strength = 0.15) {
        for (let i = 0; i < dst.length; i += 4) {
          let avg = (dst[i] + dst[i + 1] + dst[i + 2]) / 3;
          let haze = avg * strength;
          dst[i] = Math.min(255, Math.max(0, dst[i] - haze));
          dst[i + 1] = Math.min(255, Math.max(0, dst[i + 1] - haze));
          dst[i + 2] = Math.min(255, Math.max(0, dst[i + 2] - haze));
        }
      }

      // =========================================================
      //  7. HDR TONE MAPPING (যদি HDR অন থাকে)
      // =========================================================
      function toneMapping() {
        for (let i = 0; i < dst.length; i += 4) {
          let r = dst[i] / 255;
          let g = dst[i + 1] / 255;
          let b = dst[i + 2] / 255;
          
          let l = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          let l2 = l / (l + 1);
          let scale = l2 / (l + 0.001);
          
          dst[i] = Math.min(255, Math.max(0, r * scale * 255));
          dst[i + 1] = Math.min(255, Math.max(0, g * scale * 255));
          dst[i + 2] = Math.min(255, Math.max(0, b * scale * 255));
        }
      }

      // =========================================================
      //  APPLY ALL ENHANCEMENTS
      // =========================================================
      
      // Always apply core enhancements
      unsharpMask(1.5, 1);          // শার্পনিং
      smartDenoise(0.25);            // নয়েজ রিমুভ
      autoLevels();                  // কন্ট্রাস্ট
      vibrance(0.3);                 // রং বুস্ট
      shadowHighlight(0.1, 0.1);     // শ্যাডো/হাইলাইট
      dehaze(0.1);                   // কুয়াশা দূর
      
      // HDR only if enabled
      if (isHDR) {
        toneMapping();
      }

      workCtx.putImageData(output, 0, 0);
      return workCanvas;
    }

    // ============================================================
    //  CAMERA FUNCTIONS
    // ============================================================
    async function startCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());

      let width = currentQuality === 2 ? 1920 : currentQuality === 1 ? 1440 : 1280;
      let height = currentQuality === 2 ? 1080 : currentQuality === 1 ? 1080 : 720;

      if (isPortrait) [width, height] = [height, width];

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: currentCamera,
            width: { ideal: width },
            height: { ideal: height }
          }
        });
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        console.error(err);
        alert("ক্যামেরা চালু করতে সমস্যা হয়েছে।");
      }
    }

    function switchCamera() {
      currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
      startCamera();
    }

    // ============================================================
    //  MENU FUNCTIONS
    // ============================================================
    function toggleModeMenu() {
      modeOptions.style.display = modeOptions.style.display === 'block' ? 'none' : 'block';
    }

    function setQualityMode(mode) {
      currentQuality = mode;
      currentModeEl.textContent = qualityModes[mode];
      document.querySelectorAll('.mode-option').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.mode-option')[mode].classList.add('active');
      startCamera();
    }

    function toggleHDR(el) {
      isHDR = !isHDR;
      el.style.color = isHDR ? '#4ade80' : 'rgba(255,255,255,0.75)';
    }

    function togglePortrait(el) {
      isPortrait = !isPortrait;
      el.style.color = isPortrait ? '#4ade80' : 'rgba(255,255,255,0.75)';
      startCamera();
    }

    function resetSettings() {
      currentQuality = 0;
      isHDR = false;
      isPortrait = false;
      currentModeEl.textContent = 'HD';
      modeOptions.style.display = 'none';
      document.querySelectorAll('.sub-option').forEach(opt => {
        opt.style.color = 'rgba(255,255,255,0.75)';
      });
      startCamera();
      alert("সব সেটিংস রিসেট করা হয়েছে");
    }

    function toggleGallery() {
      alert("📸 গ্যালারি খুলছে... (ছবি অটো ডাউনলোড হয়েছে)");
    }

    // ============================================================
    //  📷 CAPTURE PHOTO
    // ============================================================
    async function capturePhoto() {
      if (!stream || isProcessing) return;

      isProcessing = true;
      captureBtn.classList.add('processing');
      processingOverlay.classList.add('active');

      try {
        // Flash
        flash.style.opacity = '0.75';
        setTimeout(() => flash.style.opacity = '0', 120);

        // Timer
        timerEl.style.display = 'block';
        for (let i = 3; i >= 1; i--) {
          timerEl.textContent = i;
          await new Promise(r => setTimeout(r, 450));
        }
        timerEl.style.display = 'none';

        // Capture from video
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        // Apply camera preset filter
        const preset = CAMERA_PRESETS[currentQuality] || CAMERA_PRESETS[0];
        ctx.filter = preset.filter;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.filter = 'none';

        // Vignette (light)
        const gradient = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, canvas.width / 3.5,
          canvas.width / 2, canvas.height / 2, canvas.width / 1.1
        );
        gradient.addColorStop(0, 'rgba(255,255,255,0)');
        gradient.addColorStop(1, 'rgba(0,0,0,0.08)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 🚀 APPLY PRO ENHANCEMENT
        const enhancedCanvas = proEnhanceImage(canvas);
        
        // Get final image
        const finalDataUrl = enhancedCanvas.toDataURL('image/jpeg', 0.97);

        // Show preview
        thumb.src = finalDataUrl;
        preview.style.display = 'block';

        // Show result
        resultImg.src = finalDataUrl;
        resultPage.style.display = 'flex';

        // Download
        const link = document.createElement('a');
        link.href = finalDataUrl;
        const mode = qualityModes[currentQuality];
        const hdrTag = isHDR ? '_HDR' : '';
        const portraitTag = isPortrait ? '_Portrait' : '';
        link.download = `GlassCam_${mode}${hdrTag}${portraitTag}_${Date.now()}.jpg`;
        link.click();

        // Vibrate
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);

        setTimeout(() => {
          resultPage.style.display = 'none';
        }, 1500);

      } catch (e) {
        console.error('Capture error:', e);
        alert('ছবি তুলতে সমস্যা হয়েছে!');
      } finally {
        isProcessing = false;
        captureBtn.classList.remove('processing');
        processingOverlay.classList.remove('active');
      }
    }

    // ============================================================
    //  EVENTS
    // ============================================================
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.mode-selector')) modeOptions.style.display = 'none';
    });

    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (Math.abs(e.changedTouches[0].screenX - touchStartX) > 120) switchCamera();
    }, { passive: true });

    // ============================================================
    //  INIT
    // ============================================================
    window.onload = () => {
      startCamera();
      document.addEventListener('contextmenu', e => e.preventDefault());
      console.log('📸 Glass Camera Pro Enhanced loaded!');
    };
  </script>
</body>
</html>
