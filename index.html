<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DSLR Killer · Pro Camera</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      background: #000;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 16px;
      pointer-events: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .app-logo {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .app-logo span {
      font-weight: 300;
      -webkit-text-fill-color: rgba(255, 255, 255, 0.3);
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      transition: color 0.3s;
    }

    .toggle-label.active-night {
      color: #4a7aff;
    }

    .toggle-label.active-day {
      color: #ffb833;
    }

    .switch {
      width: 48px;
      height: 26px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      position: relative;
      cursor: pointer;
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .switch.night {
      background: rgba(74, 122, 255, 0.2);
      border-color: rgba(74, 122, 255, 0.15);
    }

    .switch.day {
      background: rgba(255, 184, 51, 0.15);
      border-color: rgba(255, 184, 51, 0.1);
    }

    .switch-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      transition: all 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    }

    .switch.night .switch-knob {
      left: 25px;
      background: #4a7aff;
      box-shadow: 0 2px 16px rgba(74, 122, 255, 0.4);
    }

    .switch.day .switch-knob {
      left: 25px;
      background: #ffb833;
      box-shadow: 0 2px 16px rgba(255, 184, 51, 0.4);
    }

    /* ===== BOTTOM CONTROLS ===== */
    .bottom-controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 40px;
      pointer-events: auto;
    }

    .btn-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #fff;
      font-size: 24px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-circle:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-capture {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      border: 4px solid #fff;
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.15s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .btn-capture:active {
      transform: scale(0.88);
    }

    .btn-capture.processing {
      opacity: 0.5;
      pointer-events: none;
    }

    .btn-capture .ai-badge {
      position: absolute;
      bottom: -6px;
      right: -6px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
      font-size: 8px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      border: 2px solid #0a0a0a;
    }

    /* ===== FLASH ===== */
    .flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.1s;
    }

    /* ===== PROCESSING OVERLAY ===== */
    .processing-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .processing-overlay.active {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.06);
      border-top: 3px solid #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .processing-text {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.5px;
    }

    .processing-sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
    }

    /* ===== RESULT OVERLAY ===== */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .result-overlay.active {
      display: flex;
    }

    .result-overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ===== GALLERY MODAL ===== */
    .gallery-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 30px;
    }

    .gallery-modal.active {
      display: flex;
    }

    .gallery-modal img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      object-fit: contain;
    }

    .gallery-close {
      position: absolute;
      top: 30px;
      right: 30px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .gallery-close:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .gallery-footer {
      margin-top: 24px;
      text-align: center;
    }

    .gallery-footer .brand {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .gallery-footer .sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* ===== LOADING OVERLAY ===== */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    #loadingOverlay .title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    #loadingOverlay .subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .progress-container {
      width: 240px;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6b6b, #ffb833);
      border-radius: 4px;
      transition: width 0.3s;
    }

    #loadStatus {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
    }

    #cacheBadge {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.15);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    canvas {
      display: none;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .top-bar {
        padding: 8px 14px;
        gap: 12px;
        top: 16px;
      }
      .app-logo {
        font-size: 14px;
      }
      .toggle-label {
        font-size: 9px;
      }
      .switch {
        width: 42px;
        height: 24px;
      }
      .switch-knob {
        width: 16px;
        height: 16px;
      }
      .switch.night .switch-knob,
      .switch.day .switch-knob {
        left: 22px;
      }
      .btn-capture {
        width: 68px;
        height: 68px;
      }
      .btn-circle {
        width: 50px;
        height: 50px;
        font-size: 20px;
      }
      .bottom-controls {
        gap: 30px;
        bottom: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== LOADING OVERLAY ===== -->
  <div id="loadingOverlay">
    <div class="title">DSLR KILLER</div>
    <div class="subtitle">Pro Camera</div>
    <div class="spinner"></div>
    <div id="loadStatus">Loading AI Model...</div>
    <div class="progress-container">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="cacheBadge"></div>
  </div>

  <!-- ===== VIDEO ===== -->
  <video id="video" autoplay playsinline></video>

  <!-- ===== FLASH ===== -->
  <div class="flash" id="flash"></div>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <div class="app-logo">DSLR <span>KILLER</span></div>
    <div class="toggle-wrap">
      <span class="toggle-label active-night" id="labelLeft">NIGHT</span>
      <div class="switch night" id="switchTrack">
        <div class="switch-knob" id="switchKnob"></div>
      </div>
      <span class="toggle-label" id="labelRight">DAY</span>
    </div>
  </div>

  <!-- ===== BOTTOM CONTROLS ===== -->
  <div class="bottom-controls">
    <button class="btn-circle" onclick="switchCamera()" title="Switch Camera">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h6v6"></path>
        <path d="M9 21H3v-6"></path>
        <path d="M21 3L3 21"></path>
      </svg>
    </button>

    <button class="btn-capture" id="captureBtn" onclick="capturePhoto()">
      <div class="ai-badge">AI</div>
    </button>

    <button class="btn-circle" onclick="openGallery()" title="Gallery">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
    </button>
  </div>

  <!-- ===== PROCESSING OVERLAY ===== -->
  <div class="processing-overlay" id="processingOverlay">
    <div class="spinner"></div>
    <div class="processing-text">✨ AI Enhancing...</div>
    <div class="processing-sub" id="processingSub">Please wait</div>
  </div>

  <!-- ===== RESULT OVERLAY ===== -->
  <div class="result-overlay" id="resultOverlay">
    <img id="resultImg" alt="Result">
  </div>

  <!-- ===== GALLERY MODAL ===== -->
  <div class="gallery-modal" id="galleryModal">
    <button class="gallery-close" onclick="closeGallery()">✕</button>
    <img id="galleryImg" src="" alt="Photo">
    <div class="gallery-footer">
      <div class="brand">DSLR KILLER</div>
      <div class="sub">Pro Edition</div>
    </div>
  </div>

  <!-- ===== CANVAS (hidden) ===== -->
  <canvas id="canvas"></canvas>

  <script>
    // ============================================================
    //  STATE
    // ============================================================
    let stream = null;
    let currentCamera = 'environment';
    let isNightMode = true;
    let session = null;
    let isModelReady = false;
    let lastPhotoData = null;
    let isProcessing = false;

    // ============================================================
    //  DOM REFS
    // ============================================================
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const flash = document.getElementById('flash');
    const switchTrack = document.getElementById('switchTrack');
    const labelLeft = document.getElementById('labelLeft');
    const labelRight = document.getElementById('labelRight');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const loadStatus = document.getElementById('loadStatus');
    const progressFill = document.getElementById('progressFill');
    const cacheBadge = document.getElementById('cacheBadge');
    const processingOverlay = document.getElementById('processingOverlay');
    const processingSub = document.getElementById('processingSub');
    const resultOverlay = document.getElementById('resultOverlay');
    const resultImg = document.getElementById('resultImg');
    const galleryModal = document.getElementById('galleryModal');
    const galleryImg = document.getElementById('galleryImg');
    const captureBtn = document.getElementById('captureBtn');

    // ============================================================
    //  INDEXEDDB - PERSISTENT MODEL CACHE
    // ============================================================
    async function getModelFromIndexedDB() {
      const DB_NAME = 'DSLRKillerDB';
      const STORE_NAME = 'models';
      const KEY = 'esrgan_model';

      function openDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME);
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function getFromDB(db) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const request = store.get(KEY);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function saveToDB(db, data) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          const request = store.put(data, KEY);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

      try {
        const db = await openDB();
        const cached = await getFromDB(db);

        if (cached) {
          cacheBadge.textContent = '✓ Loaded from IndexedDB';
          return cached;
        }

        // Download model
        const MODEL_URL =
          'https://huggingface.co/HeySomDev/my-camera-modell/resolve/main/real-esrgan-x4plus-128%20(1).onnx?download=true';

        loadStatus.textContent = 'Downloading Model...';
        const response = await fetch(MODEL_URL);
        const totalSize = parseInt(response.headers.get('content-length') || '50000000');
        const reader = response.body.getReader();
        const chunks = [];
        let loadedSize = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loadedSize += value.length;
          const progress = Math.min(100, (loadedSize / totalSize) * 100);
          progressFill.style.width = progress + '%';
          loadStatus.textContent = `Downloading... ${Math.round(progress)}%`;
        }

        const blob = new Blob(chunks);
        const arrayBuffer = await blob.arrayBuffer();

        await saveToDB(db, arrayBuffer);
        cacheBadge.textContent = '✓ Cached in IndexedDB';

        return arrayBuffer;
      } catch (e) {
        console.error('IndexedDB error:', e);
        // Fallback to localStorage
        const FALLBACK_KEY = 'dslr_model_fallback';
        const fallbackData = localStorage.getItem(FALLBACK_KEY);
        if (fallbackData) {
          cacheBadge.textContent = '✓ Loaded from localStorage';
          return Uint8Array.from(atob(fallbackData), c => c.charCodeAt(0)).buffer;
        }

        // Direct download
        const response = await fetch(
          'https://huggingface.co/HeySomDev/my-camera-modell/resolve/main/real-esrgan-x4plus-128%20(1).onnx?download=true'
        );
        return await response.arrayBuffer();
      }
    }

    // ============================================================
    //  INIT AI MODEL
    // ============================================================
    async function initAIModel() {
      try {
        loadingOverlay.style.display = 'flex';
        loadStatus.textContent = 'Initializing AI...';
        progressFill.style.width = '0%';

        ort.env.wasm.numThreads = navigator.hardwareConcurrency || 4;
        ort.env.wasm.simd = true;

        const modelData = await getModelFromIndexedDB();
        session = await ort.InferenceSession.create(modelData);
        isModelReady = true;

        loadStatus.textContent = '✅ Ready!';
        cacheBadge.textContent = '✓ AI Model Loaded';

        setTimeout(() => {
          loadingOverlay.style.display = 'none';
        }, 600);

        console.log('✅ AI Model Ready');
      } catch (e) {
        console.error('❌ Model init failed:', e);
        loadStatus.textContent = '⚠️ AI unavailable (offline mode)';
        setTimeout(() => {
          loadingOverlay.style.display = 'none';
        }, 1500);
      }
    }

    // ============================================================
    //  AI ENHANCE
    // ============================================================
    async function enhanceWithAI(imageData) {
      if (!session || !isModelReady) {
        return imageData;
      }

      try {
        const inputSize = 128;

        // Resize to 128x128
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = inputSize;
        tempCanvas.height = inputSize;

        const img = new Image();
        img.src = imageData;
        await new Promise((resolve) => { img.onload = resolve; });
        tempCtx.drawImage(img, 0, 0, inputSize, inputSize);

        // Get pixel data
        const inputData = tempCtx.getImageData(0, 0, inputSize, inputSize);
        const input = new Float32Array(inputSize * inputSize * 3);

        for (let i = 0; i < inputSize * inputSize; i++) {
          const idx = i * 4;
          input[i * 3] = inputData.data[idx] / 255.0;
          input[i * 3 + 1] = inputData.data[idx + 1] / 255.0;
          input[i * 3 + 2] = inputData.data[idx + 2] / 255.0;
        }

        const inputTensor = new ort.Tensor('float32', input, [1, 3, inputSize, inputSize]);
        const feeds = { input: inputTensor };
        const results = await session.run(feeds);
        const output = results.output;
        const outputData = output.data;
        const [_, channels, height, width] = output.dims;

        // Create output image
        const outCanvas = document.createElement('canvas');
        const outCtx = outCanvas.getContext('2d');
        outCanvas.width = width;
        outCanvas.height = height;
        const imageArray = outCtx.createImageData(width, height);

        for (let i = 0; i < width * height; i++) {
          const idx = i * 4;
          imageArray.data[idx] = Math.min(255, Math.max(0, outputData[i] * 255));
          imageArray.data[idx + 1] = Math.min(255, Math.max(0, outputData[i + width * height] * 255));
          imageArray.data[idx + 2] = Math.min(255, Math.max(0, outputData[i + 2 * width * height] * 255));
          imageArray.data[idx + 3] = 255;
        }

        outCtx.putImageData(imageArray, 0, 0);

        // Scale back to 1920x1080
        const finalCanvas = document.createElement('canvas');
        const finalCtx = finalCanvas.getContext('2d');
        finalCanvas.width = 1920;
        finalCanvas.height = 1080;
        finalCtx.drawImage(outCanvas, 0, 0, 1920, 1080);

        return finalCanvas.toDataURL('image/jpeg', 0.95);
      } catch (e) {
        console.error('AI enhance failed:', e);
        return imageData;
      }
    }

    // ============================================================
    //  CAMERA
    // ============================================================
    async function startCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: currentCamera,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });
        video.srcObject = stream;
        await video.play();
      } catch (e) {
        console.error(e);
        alert('⚠️ Camera access needed!');
      }
    }

    function switchCamera() {
      currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
      startCamera();
    }

    // ============================================================
    //  DAY/NIGHT SWITCH
    // ============================================================
    function toggleDayNight() {
      isNightMode = !isNightMode;

      switchTrack.classList.remove('night', 'day');
      labelLeft.classList.remove('active-night', 'active-day');
      labelRight.classList.remove('active-night', 'active-day');

      if (isNightMode) {
        switchTrack.classList.add('night');
        labelLeft.classList.add('active-night');
        labelLeft.style.color = '#4a7aff';
        labelRight.style.color = 'rgba(255,255,255,0.3)';
      } else {
        switchTrack.classList.add('day');
        labelRight.classList.add('active-day');
        labelLeft.style.color = 'rgba(255,255,255,0.3)';
        labelRight.style.color = '#ffb833';
      }
    }

    switchTrack.addEventListener('click', toggleDayNight);

    // ============================================================
    //  CAPTURE
    // ============================================================
    async function capturePhoto() {
      if (!stream || isProcessing) return;

      isProcessing = true;
      captureBtn.classList.add('processing');
      processingOverlay.classList.add('active');
      processingSub.textContent = 'Capturing...';

      try {
        // Flash
        flash.style.opacity = '0.7';
        setTimeout(() => flash.style.opacity = '0', 100);

        // Capture frame
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.filter = 'contrast(115%) saturate(135%) brightness(103%)';
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        ctx.filter = 'none';

        // Vignette
        const grad = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, canvas.width / 3.5,
          canvas.width / 2, canvas.height / 2, canvas.width / 1.1
        );
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.08)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        let imageData = canvas.toDataURL('image/jpeg', 0.95);

        // AI Enhancement
        if (session && isModelReady) {
          processingSub.textContent = '🧠 AI Enhancing...';
          imageData = await enhanceWithAI(imageData);
        }

        processingSub.textContent = 'Saving...';

        // Save
        lastPhotoData = imageData;

        // Show result
        resultImg.src = imageData;
        resultOverlay.classList.add('active');
        setTimeout(() => {
          resultOverlay.classList.remove('active');
        }, 800);

        // Download
        const link = document.createElement('a');
        link.href = imageData;
        const mode = isNightMode ? 'Night' : 'Day';
        link.download = `DSLR_${mode}_${Date.now()}.jpg`;
        link.click();

        // Vibrate
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);

      } catch (e) {
        console.error('Capture error:', e);
        alert('Failed to capture!');
      } finally {
        isProcessing = false;
        captureBtn.classList.remove('processing');
        processingOverlay.classList.remove('active');
      }
    }

    // ============================================================
    //  GALLERY
    // ============================================================
    function openGallery() {
      if (!lastPhotoData) {
        alert('📸 No photo yet!');
        return;
      }
      galleryImg.src = lastPhotoData;
      galleryModal.classList.add('active');
    }

    function closeGallery() {
      galleryModal.classList.remove('active');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeGallery();
    });

    // ============================================================
    //  SWIPE TO SWITCH CAMERA
    // ============================================================
    let touchStart = 0;
    document.addEventListener('touchstart', (e) => {
      touchStart = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].screenX - touchStart;
      if (Math.abs(diff) > 80) switchCamera();
    }, { passive: true });

    // ============================================================
    //  INIT
    // ============================================================
    window.onload = async () => {
      await startCamera();
      initAIModel();

      // Default: Night mode
      isNightMode = true;
      switchTrack.classList.add('night');
      labelLeft.classList.add('active-night');
      labelLeft.style.color = '#4a7aff';
      labelRight.style.color = 'rgba(255,255,255,0.3)';

      document.addEventListener('contextmenu', (e) => e.preventDefault());
    };

    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
    });
  </script>
</body>
  </html>
