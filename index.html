<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DSLR Killer · Pro Camera</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none;touch-action:none}
    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;background:#000;transform:scaleX(-1)}
    .top-bar{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(0,0,0,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 20px;border-radius:50px;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:16px;pointer-events:auto;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    .app-logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#ff6b6b,#ee5a24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
    .app-logo span{font-weight:300;-webkit-text-fill-color:rgba(255,255,255,.3)}
    .toggle-wrap{display:flex;align-items:center;gap:8px}
    .toggle-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;transition:color .3s}
    .toggle-label.active-night{color:#4a7aff}.toggle-label.active-day{color:#ffb833}
    .switch{width:48px;height:26px;background:rgba(255,255,255,.06);border-radius:40px;position:relative;cursor:pointer;border:1.5px solid rgba(255,255,255,.06);transition:background .3s;flex-shrink:0}
    .switch.night{background:rgba(74,122,255,.2);border-color:rgba(74,122,255,.15)}.switch.day{background:rgba(255,184,51,.15);border-color:rgba(255,184,51,.1)}
    .switch-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:all .3s cubic-bezier(.34,1.4,.64,1);box-shadow:0 2px 12px rgba(0,0,0,.4)}
    .switch.night .switch-knob,.switch.day .switch-knob{left:25px}.switch.night .switch-knob{background:#4a7aff;box-shadow:0 2px 16px rgba(74,122,255,.4)}.switch.day .switch-knob{background:#ffb833;box-shadow:0 2px 16px rgba(255,184,51,.4)}
    .bottom-controls{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:40px;pointer-events:auto}
    .btn-circle{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:#fff;font-size:24px;outline:none;-webkit-tap-highlight-color:transparent}
    .btn-circle:active{transform:scale(.92);background:rgba(255,255,255,.12)}
    .btn-capture{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.95);border:4px solid #fff;box-shadow:0 0 0 8px rgba(255,255,255,.15);cursor:pointer;transition:all .15s;outline:none;-webkit-tap-highlight-color:transparent;position:relative}
    .btn-capture:active{transform:scale(.88)}.btn-capture.processing{opacity:.5;pointer-events:none}
    .btn-capture .ai-badge{position:absolute;bottom:-6px;right:-6px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;font-size:8px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.5px;border:2px solid #0a0a0a}
    .flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;transition:opacity .1s}
    .processing-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
    .processing-overlay.active{display:flex}.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.06);border-top:3px solid #fff;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    .processing-text{font-size:14px;font-weight:500;color:rgba(255,255,255,.7);letter-spacing:.5px}.processing-sub{font-size:11px;color:rgba(255,255,255,.3)}
    .result-overlay{position:fixed;inset:0;background:#000;z-index:80;display:none;align-items:center;justify-content:center}.result-overlay.active{display:flex}.result-overlay img{width:100%;height:100%;object-fit:contain}
    .gallery-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;padding:30px}.gallery-modal.active{display:flex}
    .gallery-modal img{max-width:100%;max-height:70vh;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.6);object-fit:contain}.gallery-close{position:absolute;top:30px;right:30px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}.gallery-close:hover{background:rgba(255,255,255,.12)}
    .gallery-footer{margin-top:24px;text-align:center}.gallery-footer .brand{font-size:22px;font-weight:800;background:linear-gradient(135deg,#ff6b6b,#ee5a24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.gallery-footer .sub{font-size:11px;color:rgba(255,255,255,.2);margin-top:4px;letter-spacing:2px}
    #loadingOverlay{position:fixed;inset:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
    #loadingOverlay .title{font-size:28px;font-weight:800;background:linear-gradient(135deg,#ff6b6b,#ee5a24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}#loadingOverlay .subtitle{font-size:13px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase}
    .progress-container{width:240px;height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:8px}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff6b6b,#ffb833);border-radius:4px;transition:width .3s}
    #loadStatus{font-size:13px;color:rgba(255,255,255,.5);margin-top:4px}#cacheBadge{font-size:10px;color:rgba(255,255,255,.15);margin-top:2px;letter-spacing:.5px}
    canvas{display:none}
    .toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%);z-index:300;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px);padding:10px 14px;border-radius:999px;color:#fff;font-size:12px;opacity:0;pointer-events:none;transition:.25s}
    .toast.show{opacity:1}
    @media (max-width:480px){.top-bar{padding:8px 14px;gap:12px;top:16px}.app-logo{font-size:14px}.toggle-label{font-size:9px}.switch{width:42px;height:24px}.switch-knob{width:16px;height:16px}.switch.night .switch-knob,.switch.day .switch-knob{left:22px}.btn-capture{width:68px;height:68px}.btn-circle{width:50px;height:50px;font-size:20px}.bottom-controls{gap:30px;bottom:30px}.toast{bottom:100px}}
  </style>
</head>
<body>
  <div id="loadingOverlay">
    <div class="title">DSLR KILLER</div>
    <div class="subtitle">Pro Camera</div>
    <div class="spinner"></div>
    <div id="loadStatus">Loading AI Model...</div>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
    <div id="cacheBadge"></div>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <div class="flash" id="flash"></div>

  <div class="top-bar">
    <div class="app-logo">DSLR <span>KILLER</span></div>
    <div class="toggle-wrap">
      <span class="toggle-label active-night" id="labelLeft">NIGHT</span>
      <div class="switch night" id="switchTrack"><div class="switch-knob" id="switchKnob"></div></div>
      <span class="toggle-label" id="labelRight">DAY</span>
    </div>
  </div>

  <div class="bottom-controls">
    <button class="btn-circle" onclick="switchCamera()" title="Switch Camera">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3L3 21"></path></svg>
    </button>
    <button class="btn-capture" id="captureBtn" onclick="capturePhoto()"><div class="ai-badge">AI</div></button>
    <button class="btn-circle" onclick="openGallery()" title="Gallery">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
    </button>
  </div>

  <div class="processing-overlay" id="processingOverlay">
    <div class="spinner"></div>
    <div class="processing-text">✨ AI Enhancing...</div>
    <div class="processing-sub" id="processingSub">Please wait</div>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <img id="resultImg" alt="Result">
  </div>

  <div class="gallery-modal" id="galleryModal">
    <button class="gallery-close" onclick="closeGallery()">✕</button>
    <img id="galleryImg" src="" alt="Photo">
    <div class="gallery-footer">
      <div class="brand">DSLR KILLER</div>
      <div class="sub">Pro Edition</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <canvas id="canvas"></canvas>

  <script>
    let stream = null, currentCamera = 'environment', isNightMode = true, session = null, modelReady = false, lastPhotoData = null, isProcessing = false, inputName = null, outputName = null;
    const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { willReadFrequently: true }), flash = document.getElementById('flash'), switchTrack = document.getElementById('switchTrack'), labelLeft = document.getElementById('labelLeft'), labelRight = document.getElementById('labelRight'), loadingOverlay = document.getElementById('loadingOverlay'), loadStatus = document.getElementById('loadStatus'), progressFill = document.getElementById('progressFill'), cacheBadge = document.getElementById('cacheBadge'), processingOverlay = document.getElementById('processingOverlay'), processingSub = document.getElementById('processingSub'), resultOverlay = document.getElementById('resultOverlay'), resultImg = document.getElementById('resultImg'), galleryModal = document.getElementById('galleryModal'), galleryImg = document.getElementById('galleryImg'), captureBtn = document.getElementById('captureBtn'), toast = document.getElementById('toast');
    const MODEL_URL = 'https://huggingface.co/HeySomDev/my-camera-modell/resolve/main/real-esrgan-x4plus-128%20(1).onnx?download=true';

    function showToast(msg){toast.textContent = msg;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1800)}

    async function getModelFromIndexedDB() {
      const DB_NAME = 'DSLRKillerDB', STORE_NAME = 'models', KEY = 'esrgan_model';
      const openDB = () => new Promise((resolve, reject) => { const request = indexedDB.open(DB_NAME, 1); request.onupgradeneeded = e => { const db = e.target.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME); }; request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); });
      const getFromDB = db => new Promise((resolve, reject) => { const tx = db.transaction(STORE_NAME, 'readonly'); const store = tx.objectStore(STORE_NAME); const request = store.get(KEY); request.onsuccess = () => resolve(request.result); request.onerror = () => reject(request.error); });
      const saveToDB = (db, data) => new Promise((resolve, reject) => { const tx = db.transaction(STORE_NAME, 'readwrite'); const store = tx.objectStore(STORE_NAME); const request = store.put(data, KEY); request.onsuccess = () => resolve(); request.onerror = () => reject(request.error); });
      try {
        const db = await openDB();
        const cached = await getFromDB(db);
        if (cached) { cacheBadge.textContent = '✓ Loaded from IndexedDB'; return cached; }
        loadStatus.textContent = 'Downloading Model...';
        const response = await fetch(MODEL_URL);
        const totalSize = parseInt(response.headers.get('content-length') || '50000000');
        if (!response.body) { const ab = await response.arrayBuffer(); await saveToDB(db, ab); cacheBadge.textContent = '✓ Cached in IndexedDB'; return ab; }
        const reader = response.body.getReader();
        const chunks = []; let loadedSize = 0;
        while (true) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); loadedSize += value.length; const progress = Math.min(100, (loadedSize / totalSize) * 100); progressFill.style.width = progress + '%'; loadStatus.textContent = `Downloading... ${Math.round(progress)}%`; }
        const blob = new Blob(chunks); const arrayBuffer = await blob.arrayBuffer(); await saveToDB(db, arrayBuffer); cacheBadge.textContent = '✓ Cached in IndexedDB'; return arrayBuffer;
      } catch (e) {
        console.error('IndexedDB/model fetch error:', e);
        showToast('Model cache unavailable, using direct load');
        const response = await fetch(MODEL_URL);
        return await response.arrayBuffer();
      }
    }

    async function initAIModel() {
      try {
        loadingOverlay.style.display = 'flex';
        loadStatus.textContent = 'Initializing AI...';
        progressFill.style.width = '0%';
        ort.env.wasm.numThreads = navigator.hardwareConcurrency || 4;
        ort.env.wasm.simd = true;
        const modelData = await getModelFromIndexedDB();
        session = await ort.InferenceSession.create(modelData, { executionProviders: ['wasm'] });
        const ins = session.inputNames || (session.getInputs ? session.getInputs().map(i => i.name) : []);
        const outs = session.outputNames || (session.getOutputs ? session.getOutputs().map(o => o.name) : []);
        inputName = ins[0] || 'input';
        outputName = outs[0] || 'output';
        modelReady = true;
        loadStatus.textContent = '✅ Ready!';
        cacheBadge.textContent = '✓ AI Model Loaded';
        setTimeout(() => loadingOverlay.style.display = 'none', 500);
      } catch (e) {
        console.error('Model init failed:', e);
        modelReady = false;
        loadStatus.textContent = '⚠️ AI unavailable (offline mode)';
        setTimeout(() => loadingOverlay.style.display = 'none', 1200);
      }
    }

    async function enhanceWithAI(imageData) {
      if (!session || !modelReady) return imageData;
      const inputSize = 128;
      try {
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');
        tempCanvas.width = inputSize; tempCanvas.height = inputSize;
        const img = new Image(); img.src = imageData;
        await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
        tempCtx.drawImage(img, 0, 0, inputSize, inputSize);
        const inputData = tempCtx.getImageData(0, 0, inputSize, inputSize);
        const input = new Float32Array(inputSize * inputSize * 3);
        for (let i = 0; i < inputSize * inputSize; i++) {
          const idx = i * 4;
          input[i * 3] = inputData.data[idx] / 255.0;
          input[i * 3 + 1] = inputData.data[idx + 1] / 255.0;
          input[i * 3 + 2] = inputData.data[idx + 2] / 255.0;
        }
        const inputTensor = new ort.Tensor('float32', input, [1, 3, inputSize, inputSize]);
        const feeds = {}; feeds[inputName] = inputTensor;
        const results = await session.run(feeds);
        const output = results[outputName] || Object.values(results)[0];
        if (!output) return imageData;
        const outputData = output.data;
        const [b, channels, height, width] = output.dims;
        const outCanvas = document.createElement('canvas');
        const outCtx = outCanvas.getContext('2d');
        outCanvas.width = width; outCanvas.height = height;
        const imageArray = outCtx.createImageData(width, height);
        const plane = width * height;
        for (let i = 0; i < plane; i++) {
          const idx = i * 4;
          imageArray.data[idx] = Math.max(0, Math.min(255, (outputData[i] ?? 0) * 255));
          imageArray.data[idx + 1] = Math.max(0, Math.min(255, (outputData[i + plane] ?? 0) * 255));
          imageArray.data[idx + 2] = Math.max(0, Math.min(255, (outputData[i + plane * 2] ?? 0) * 255));
          imageArray.data[idx + 3] = 255;
        }
        outCtx.putImageData(imageArray, 0, 0);
        const finalCanvas = document.createElement('canvas');
        const finalCtx = finalCanvas.getContext('2d');
        finalCanvas.width = 1920; finalCanvas.height = 1080;
        finalCtx.drawImage(outCanvas, 0, 0, 1920, 1080);
        return finalCanvas.toDataURL('image/jpeg', 0.95);
      } catch (e) {
        console.error('AI enhance failed:', e);
        return imageData;
      }
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) { showToast('Camera not supported'); return; }
      if (stream) stream.getTracks().forEach(t => t.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: currentCamera }, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
        video.srcObject = stream;
        await video.play();
      } catch (e) { console.error(e); alert('⚠️ Camera access needed!'); }
    }

    function switchCamera() { currentCamera = currentCamera === 'environment' ? 'user' : 'environment'; startCamera(); }
    function toggleDayNight() {
      isNightMode = !isNightMode; switchTrack.classList.remove('night', 'day'); labelLeft.classList.remove('active-night', 'active-day'); labelRight.classList.remove('active-night', 'active-day');
      if (isNightMode) { switchTrack.classList.add('night'); labelLeft.classList.add('active-night'); labelLeft.style.color = '#4a7aff'; labelRight.style.color = 'rgba(255,255,255,0.3)'; }
      else { switchTrack.classList.add('day'); labelRight.classList.add('active-day'); labelLeft.style.color = 'rgba(255,255,255,0.3)'; labelRight.style.color = '#ffb833'; }
    }
    switchTrack.addEventListener('click', toggleDayNight);

    async function capturePhoto() {
      if (!stream || isProcessing) return;
      const vw = video.videoWidth, vh = video.videoHeight;
      if (!vw || !vh) { showToast('Camera not ready'); return; }
      isProcessing = true; captureBtn.classList.add('processing'); processingOverlay.classList.add('active'); processingSub.textContent = 'Capturing...';
      try {
        flash.style.opacity = '0.7'; setTimeout(() => flash.style.opacity = '0', 100);
        canvas.width = vw; canvas.height = vh;
        ctx.save();
        if (currentCamera === 'user') { ctx.translate(vw, 0); ctx.scale(-1, 1); }
        ctx.filter = 'contrast(115%) saturate(135%) brightness(103%)';
        ctx.drawImage(video, 0, 0, vw, vh);
        ctx.filter = 'none';
        ctx.restore();
        const grad = ctx.createRadialGradient(vw / 2, vh / 2, vw / 3.5, vw / 2, vh / 2, vw / 1.1);
        grad.addColorStop(0, 'rgba(255,255,255,0)'); grad.addColorStop(1, 'rgba(0,0,0,0.08)');
        ctx.fillStyle = grad; ctx.fillRect(0, 0, vw, vh);
        let imageData = canvas.toDataURL('image/jpeg', 0.95);
        if (session && modelReady) { processingSub.textContent = '🧠 AI Enhancing...'; imageData = await enhanceWithAI(imageData); }
        processingSub.textContent = 'Saving...'; lastPhotoData = imageData; resultImg.src = imageData; resultOverlay.classList.add('active'); setTimeout(() => resultOverlay.classList.remove('active'), 800);
        const link = document.createElement('a'); link.href = imageData; link.download = `DSLR_${isNightMode ? 'Night' : 'Day'}_${Date.now()}.jpg`; link.click();
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
      } catch (e) { console.error('Capture error:', e); alert('Failed to capture!'); }
      finally { isProcessing = false; captureBtn.classList.remove('processing'); processingOverlay.classList.remove('active'); }
    }

    function openGallery() { if (!lastPhotoData) return alert('📸 No photo yet!'); galleryImg.src = lastPhotoData; galleryModal.classList.add('active'); }
    function closeGallery() { galleryModal.classList.remove('active'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGallery(); });

    let touchStartX = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    document.addEventListener('touchend', e => { const diff = e.changedTouches[0].screenX - touchStartX; if (Math.abs(diff) > 80) switchCamera(); }, { passive: true });

    window.addEventListener('load', async () => {
      switchTrack.classList.add('night'); labelLeft.classList.add('active-night'); labelLeft.style.color = '#4a7aff'; labelRight.style.color = 'rgba(255,255,255,0.3)';
      document.addEventListener('contextmenu', e => e.preventDefault());
      await startCamera();
      initAIModel();
    });
    window.addEventListener('beforeunload', () => { if (stream) stream.getTracks().forEach(t => t.stop()); });
  </script>
</body>
</html>
