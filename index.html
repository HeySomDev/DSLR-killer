<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DSLR Killer · গ্লাস ক্যামেরা</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:#fff;
      font-family:'Inter', system-ui, sans-serif;
      touch-action:manipulation;
    }

    #video {
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
      background:#000;
    }

    .overlay {
      position:fixed;
      inset:0;
      z-index:2;
      pointer-events:none;
    }

    .glass {
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:9999px;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    }

    .mode-selector {
      position:fixed;
      top:24px;
      right:24px;
      z-index:10;
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:14px;
      padding:8px 20px 8px 24px;
    }

    .dslr-label {
      font-size:15px;
      font-weight:700;
      color:#fff;
      letter-spacing:0.5px;
      background:linear-gradient(135deg,#ff6b6b,#ee5a24);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .toggle-container {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .toggle-label {
      font-size:11px;
      font-weight:600;
      color:rgba(255,255,255,0.6);
      text-transform:uppercase;
      letter-spacing:0.5px;
    }

    .toggle-track {
      width:48px;
      height:26px;
      background:rgba(255,100,100,0.35);
      border-radius:40px;
      position:relative;
      cursor:pointer;
      transition:background 0.4s ease;
      border:1px solid rgba(255,255,255,0.08);
    }

    .toggle-track.night {
      background:rgba(50,80,255,0.4);
    }

    .toggle-track.day {
      background:rgba(255,180,50,0.35);
    }

    .toggle-knob {
      position:absolute;
      top:2px;
      left:2px;
      width:20px;
      height:20px;
      border-radius:50%;
      background:#fff;
      transition:left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
      box-shadow:0 2px 12px rgba(0,0,0,0.4);
    }

    .toggle-track.night .toggle-knob {
      left:24px;
      background:#4a7aff;
    }

    .toggle-track.day .toggle-knob {
      left:24px;
      background:#ffb833;
    }

    .toggle-track:not(.night):not(.day) .toggle-knob {
      left:2px;
      background:#ff6b6b;
    }

    .controls {
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      gap:50px;
      z-index:10;
      pointer-events:auto;
    }

    .capture-btn {
      width:82px;
      height:82px;
      border-radius:50%;
      background:rgba(255,255,255,0.95);
      border:6px solid #fff;
      box-shadow:0 0 0 10px rgba(255,255,255,0.2);
      cursor:pointer;
      transition:transform .15s;
      outline:none;
      -webkit-tap-highlight-color:transparent;
    }

    .capture-btn:active { transform:scale(0.90); }

    .side-btn {
      width:58px;
      height:58px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.10);
      transition:.25s;
      outline:none;
      -webkit-tap-highlight-color:transparent;
      cursor:pointer;
      color:#fff;
    }

    .side-btn:active {
      background:rgba(255,255,255,0.20);
      transform:scale(0.92);
    }

    .flash {
      position:fixed;
      inset:0;
      background:#fff;
      opacity:0;
      pointer-events:none;
      z-index:100;
      transition:opacity .12s;
    }

    /* গ্যালারি মোডাল */
    .gallery-modal {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.92);
      backdrop-filter:blur(30px);
      z-index:200;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      padding:40px;
    }

    .gallery-modal.active {
      display:flex;
    }

    .gallery-modal img {
      max-width:100%;
      max-height:70vh;
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.8);
      object-fit:contain;
    }

    .gallery-footer {
      margin-top:30px;
      text-align:center;
    }

    .gallery-footer .brand {
      font-size:28px;
      font-weight:800;
      color:#ff2d2d;
      letter-spacing:2px;
      text-transform:uppercase;
      text-shadow:0 0 40px rgba(255,45,45,0.2);
    }

    .gallery-footer .version {
      font-size:12px;
      color:rgba(255,255,255,0.3);
      margin-top:4px;
      font-weight:300;
      letter-spacing:3px;
    }

    .gallery-close {
      position:absolute;
      top:30px;
      right:30px;
      width:48px;
      height:48px;
      border-radius:50%;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      color:#fff;
      font-size:24px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.25s;
    }

    .gallery-close:hover {
      background:rgba(255,255,255,0.12);
    }

    .result-page {
      position:fixed;
      inset:0;
      background:#000;
      z-index:150;
      display:none;
      align-items:center;
      justify-content:center;
    }

    .result-page img {
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
    }

    canvas { display:none; }

    #statusOverlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.9);
      backdrop-filter:blur(12px);
      z-index:999;
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:20px;
    }

    #statusText {
      color:#fff;
      font-size:18px;
      font-weight:500;
      letter-spacing:0.5px;
    }

    .spinner {
      width:40px;
      height:40px;
      border:3px solid rgba(255,255,255,0.05);
      border-top:3px solid #fff;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform:rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="statusOverlay">
    <div class="spinner"></div>
    <div id="statusText">🧠 AI মডেল লোড হচ্ছে...</div>
  </div>

  <video id="video" autoplay playsinline></video>

  <div class="overlay">
    <div class="mode-selector glass">
      <span class="dslr-label">⚡ DSLR</span>
      <div class="toggle-container">
        <span class="toggle-label" id="modeLabel">রাত</span>
        <div class="toggle-track night" id="toggleTrack">
          <div class="toggle-knob" id="toggleKnob"></div>
        </div>
        <span class="toggle-label">দিন</span>
      </div>
    </div>

    <div id="timer" class="timer">3</div>

    <div class="controls">
      <div class="side-btn glass" onclick="switchCamera()" title="ক্যামেরা সুইচ">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6"></path>
          <path d="M9 21H3v-6"></path>
          <path d="M21 3L3 21"></path>
        </svg>
      </div>

      <div id="captureBtn" class="capture-btn" onclick="capturePhoto()"></div>

      <div class="side-btn glass" onclick="openGallery()" title="গ্যালারি">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </div>
    </div>
  </div>

  <div id="flash" class="flash"></div>

  <!-- গ্যালারি মোডাল -->
  <div class="gallery-modal" id="galleryModal">
    <button class="gallery-close" onclick="closeGallery()">✕</button>
    <img id="galleryImg" src="" alt="Latest Photo">
    <div class="gallery-footer">
      <div class="brand">DSLR KILLER</div>
      <div class="version">Version 1.0</div>
    </div>
  </div>

  <div id="resultPage" class="result-page">
    <img id="resultImg" alt="Result">
  </div>

  <canvas id="canvas"></canvas>

  <script>
    // ===== স্টেট =====
    let stream = null;
    let currentCamera = 'environment';
    let isNightMode = true;
    let session = null;
    let isModelReady = false;
    let lastPhotoData = null;

    // ===== DOM রেফারেন্স =====
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const flash = document.getElementById('flash');
    const toggleTrack = document.getElementById('toggleTrack');
    const modeLabel = document.getElementById('modeLabel');
    const statusOverlay = document.getElementById('statusOverlay');
    const statusText = document.getElementById('statusText');
    const resultPage = document.getElementById('resultPage');
    const resultImg = document.getElementById('resultImg');
    const galleryModal = document.getElementById('galleryModal');
    const galleryImg = document.getElementById('galleryImg');

    // ===== ১. AI মডেল লোড =====
    async function initAIModel() {
      try {
        statusOverlay.style.display = 'flex';
        statusText.textContent = '🧠 Real-ESRGAN লোড হচ্ছে...';

        // WASM মোডে ফোর্স (GPU না থাকলে)
        ort.env.wasm.numThreads = 4;
        ort.env.wasm.simd = true;

        session = await ort.InferenceSession.create('./models/real-esrgan-x4plus-128.onnx');
        isModelReady = true;
        console.log('✅ AI মডেল লোড সফল!');

        statusOverlay.style.display = 'none';
      } catch (e) {
        console.error('❌ মডেল লোড ব্যর্থ:', e);
        isModelReady = false;
        statusText.textContent = '⚠️ মডেল লোডে সমস্যা (অফলাইন মোড)';
        setTimeout(() => {
          statusOverlay.style.display = 'none';
        }, 2000);
      }
    }

    // ===== ২. ক্যামেরা =====
    async function startCamera() {
      if (stream) stream.getTracks().forEach(track => track.stop());

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: currentCamera,
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          }
        });
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        console.error(err);
        alert("ক্যামেরা চালু করতে সমস্যা হয়েছে।");
      }
    }

    function switchCamera() {
      currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
      startCamera();
    }

    // ===== ৩. ডে/নাইট টগল =====
    function toggleDayNight() {
      isNightMode = !isNightMode;

      toggleTrack.classList.remove('night', 'day');
      if (isNightMode) {
        toggleTrack.classList.add('night');
        modeLabel.textContent = 'রাত';
        modeLabel.style.color = '#4a7aff';
      } else {
        toggleTrack.classList.add('day');
        modeLabel.textContent = 'দিন';
        modeLabel.style.color = '#ffb833';
      }
    }

    toggleTrack.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDayNight();
    });

    // ===== ৪. কালার ইঞ্জিন (Day/Night) =====
    function purePixelEngineOnCanvas(sourceCanvas) {
      const outCanvas = document.createElement('canvas');
      outCanvas.width = sourceCanvas.width;
      outCanvas.height = sourceCanvas.height;

      const outCtx = outCanvas.getContext('2d', { willReadFrequently: true });
      outCtx.drawImage(sourceCanvas, 0, 0);

      const imageData = outCtx.getImageData(0, 0, outCanvas.width, outCanvas.height);
      const d = imageData.data;

      // Day/Night প্যারামিটার
      const brightness = isNightMode ? 1.05 : 0.92;
      const contrast = isNightMode ? 1.20 : 1.05;
      const saturation = 1.55;

      for (let i = 0; i < d.length; i += 4) {
        let r = d[i], g = d[i+1], b = d[i+2];
        let rn = r / 255, gn = g / 255, bn = b / 255;

        // কনট্রাস্ট
        rn = (rn - 0.5) * contrast + 0.5;
        gn = (gn - 0.5) * contrast + 0.5;
        bn = (bn - 0.5) * contrast + 0.5;

        // ব্রাইটনেস
        rn *= brightness;
        gn *= brightness;
        bn *= brightness;

        // স্যাচুরেশন
        const lum = 0.299 * rn + 0.587 * gn + 0.114 * bn;
        rn = lum + saturation * (rn - lum);
        gn = lum + saturation * (gn - lum);
        bn = lum + saturation * (bn - lum);

        rn = Math.min(1, Math.max(0, rn));
        gn = Math.min(1, Math.max(0, gn));
        bn = Math.min(1, Math.max(0, bn));

        d[i] = Math.round(rn * 255);
        d[i+1] = Math.round(gn * 255);
        d[i+2] = Math.round(bn * 255);
      }

      outCtx.putImageData(imageData, 0, 0);
      return outCanvas;
    }

    // ===== ৫. এআই + কালার প্রসেস =====
    async function processWithAI(canvas) {
      let processedCanvas = canvas;

      // AI প্রসেস (যদি মডেল রেডি থাকে)
      if (session && isModelReady) {
        try {
          // Real-ESRGAN ইনফারেন্স (ডেমো - আসল কোড এখানে বসবে)
          // বর্তমানে শুধু কালার ইঞ্জিন চলছে
          console.log('🧠 AI প্রসেসিং (Real-ESRGAN)');
        } catch (e) {
          console.warn('AI প্রসেস ব্যর্থ:', e);
        }
      }

      // কালার ইঞ্জিন (Day/Night)
      return purePixelEngineOnCanvas(processedCanvas);
    }

    // ===== ৬. ক্যাপচার (কাউন্টডাউন বাদ) =====
    async function capturePhoto() {
      if (!stream) return;

      // ফ্ল্যাশ
      flash.style.opacity = '0.7';
      setTimeout(() => flash.style.opacity = '0', 100);

      // ক্যানভাস সেটআপ
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // ডিএসএলআর ফিল্টার + ভিগনেট
      ctx.filter = "contrast(115%) saturate(135%) brightness(103%)";
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.filter = 'none';

      // ভিগনেট (হালকা)
      const gradient = ctx.createRadialGradient(
        canvas.width/2, canvas.height/2, canvas.width/3.5,
        canvas.width/2, canvas.height/2, canvas.width/1.1
      );
      gradient.addColorStop(0, 'rgba(255,255,255,0.0)');
      gradient.addColorStop(1, 'rgba(0,0,0,0.10)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // এআই + কালার প্রসেস
      const finalCanvas = await processWithAI(canvas);
      const finalDataUrl = finalCanvas.toDataURL('image/jpeg', 0.95);

      // লাস্ট ফটো সংরক্ষণ
      lastPhotoData = finalDataUrl;

      // রেজাল্ট প্রিভিউ
      resultImg.src = finalDataUrl;
      resultPage.style.display = 'flex';
      setTimeout(() => {
        resultPage.style.display = 'none';
      }, 800);

      // ডাউনলোড
      const link = document.createElement('a');
      link.href = finalDataUrl;
      const mode = isNightMode ? 'Night' : 'Day';
      link.download = `DSLR_Killer_${mode}_${Date.now()}.jpg`;
      link.click();

      if (navigator.vibrate) navigator.vibrate(30);
    }

    // ===== ৭. গ্যালারি =====
    function openGallery() {
      if (!lastPhotoData) {
        alert('কোনো ছবি এখনও তোলা হয়নি।');
        return;
      }
      galleryImg.src = lastPhotoData;
      galleryModal.classList.add('active');
    }

    function closeGallery() {
      galleryModal.classList.remove('active');
    }

    // ESC কী দিয়ে গ্যালারি বন্ধ
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeGallery();
    });

    // ===== ৮. উইন্ডো লোড =====
    window.onload = async () => {
      await startCamera();
      initAIModel();
      document.addEventListener('contextmenu', e => e.preventDefault());

      // ডিফল্ট: নাইট মোড
      isNightMode = true;
      toggleTrack.classList.add('night');
      modeLabel.textContent = 'রাত';
      modeLabel.style.color = '#4a7aff';
    };

    // ===== ৯. ক্লিনআপ =====
    window.addEventListener('beforeunload', () => {
      if (stream) stream.getTracks().forEach(t => t.stop());
    });

    // টাচ সুইপ - ক্যামেরা সুইচ
    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 100) switchCamera();
    }, { passive: true });
  </script>
</body>
</html>
